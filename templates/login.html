{% extends 'base.html' %}
{% block title %}Iniciar sesion — {{ app_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill sena-text" style="font-size:3rem;"></i>
                    <h4 class="mt-2 mb-0">Gestion de Fichas SENA</h4>
                    <p class="text-muted small">Acceso de administradores</p>
                </div>
                <form method="post" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-sena w-100"><i class="bi bi-box-arrow-in-right"></i> Ingresar</button>
                </form>
            </div>
        </div>
        <p class="text-center text-muted small mt-3">Cree el primer administrador con <code>python crear_admin.py</code></p>
    </div>
</div>
{% endblock %}
