{% extends 'base.html' %}
{% block title %}Editar aprendiz — {{ app_name }}{% endblock %}
{% block content %}
<h3 class="mb-3">Editar aprendiz</h3>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" action="{{ url_for('usuarios.editar', id=usuario.id) }}" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Tipo documento</label>
                    <select name="tipo_documento" class="form-select">
                        {% for td in ['CC','TI','CE','PPT'] %}
                        <option value="{{ td }}" {% if usuario.tipo_documento == td %}selected{% endif %}>{{ td }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Identificacion *</label>
                    <input type="text" name="identificacion" class="form-control" value="{{ usuario.identificacion }}" required>
                </div>
                <div class="col-md-5"></div>
                <div class="col-md-6">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos *</label>
                    <input type="text" name="apellidos" class="form-control" value="{{ usuario.apellidos }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Telefono</label>
                    <input type="text" name="telefono" class="form-control" value="{{ usuario.telefono or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Correo institucional</label>
                    <input type="email" name="correo_institucional" class="form-control" value="{{ usuario.correo_institucional or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Correo personal</label>
                    <input type="email" name="correo_personal" class="form-control" value="{{ usuario.correo_personal or '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Direccion de residencia</label>
                    <input type="text" name="direccion_residencia" class="form-control" value="{{ usuario.direccion_residencia or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ficha</label>
                    <select name="ficha_id" class="form-select">
                        <option value="">Sin ficha</option>
                        {% for f in fichas %}<option value="{{ f.id }}" {% if usuario.ficha_id == f.id %}selected{% endif %}>{{ f.numero_ficha }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Programa</label>
                    <select name="programa_id" class="form-select">
                        <option value="">Sin programa</option>
                        {% for p in programas %}<option value="{{ p.id }}" {% if usuario.programa_id == p.id %}selected{% endif %}>{{ p.nombre_programa }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    {% if usuario.firma_imagen %}
                    <label class="form-label d-block">Firma actual</label>
                    <img src="{{ url_for('static', filename='firmas/' + usuario.firma_imagen) }}" height="60" class="border rounded mb-2">
                    {% endif %}
                </div>
                <div class="col-md-6">
                    <label class="form-label">Reemplazar firma (PNG/JPG)</label>
                    <input type="file" name="firma_archivo" class="form-control" accept="image/png,image/jpeg">
                </div>
                <div class="col-md-6">
                    <label class="form-label">O dibuje una nueva firma</label>
                    <div class="border rounded p-2">
                        <canvas id="firmaCanvas" width="400" height="120" class="border w-100" style="touch-action:none;"></canvas>
                        <div class="mt-2"><button type="button" id="limpiarFirma" class="btn btn-sm btn-outline-secondary">Limpiar</button></div>
                        <input type="hidden" name="firma" id="firmaData">
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-sena"><i class="bi bi-save"></i> Actualizar</button>
                <a href="{{ url_for('usuarios.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/firma.js') }}"></script>
{% endblock %}
